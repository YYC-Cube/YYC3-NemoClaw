version: "0.1.0"
min_openshell_version: "0.0.44"
max_openshell_version: "0.0.44"
min_openclaw_version: "2026.3.11"
# Mirrors the components.sandbox.image manifest digest below. Lets a
# downstream consumer (or release tooling) verify the blueprint declares
# a specific sandbox image without parsing the components tree, and
# blocks the trivially-bypassable case where someone bumps the pinned
# image but forgets the top-level field. Release tooling should rewrite
# both fields together. See #1438.
digest: "sha256:b3d832b596ab6b7184a9dcb4ae93337ca32851a4f93b00765cc12de26baa3a9a"

profiles:
  - default
  - ncp
  - nim-local
  - vllm
  - routed
  - yyc3-ollama
  - yyc3-coder
  - yyc3-mgmt
  - yyc3-mlx
  - yyc3-vllm
  - yyc3-i18n

description: |
  NemoClaw blueprint: orchestrates OpenClaw sandbox creation, migration,
  and NIM/vLLM inference routing inside OpenShell.

components:
  sandbox:
    # Pinned to a specific image digest so a future registry compromise or an
    # accidental :latest force-push cannot silently swap the sandbox image.
    # Ref: #1438. The digest below was the resolved sha256 of the :latest tag
    # at the time of this commit; release tooling should bump it together with
    # the top-level `digest:` field on every release.
    image: "ghcr.io/nvidia/openshell-community/sandboxes/openclaw@sha256:b3d832b596ab6b7184a9dcb4ae93337ca32851a4f93b00765cc12de26baa3a9a"
    name: "openclaw"
    forward_ports:
      - 18789
    resource_profiles:
      creator:
        cpu: "50%"
        memory: "50%"
      gamer:
        cpu: "25%"
        memory: "25%"
      game-developer:
        cpu: "60%"
        memory: "60%"
      developer:
        cpu: "75%"
        memory: "75%"

  inference:
    profiles:
      default:
        provider_type: "nvidia"
        provider_name: "nvidia-inference"
        endpoint: "https://integrate.api.nvidia.com/v1"
        model: "nvidia/nemotron-3-super-120b-a12b"

      ncp:
        provider_type: "nvidia"
        provider_name: "nvidia-ncp"
        endpoint: ""
        model: "nvidia/nemotron-3-super-120b-a12b"
        credential_env: "NVIDIA_API_KEY"
        dynamic_endpoint: true

      nim-local:
        provider_type: "openai"
        provider_name: "nim-local"
        endpoint: "http://nim-service.local:8000/v1"
        model: "nvidia/nemotron-3-super-120b-a12b"
        credential_env: "NIM_API_KEY"
        timeout_secs: 180

      vllm:
        provider_type: "openai"
        provider_name: "vllm-local"
        endpoint: "http://localhost:8000/v1"
        # HF repo id (not the NIM catalog name); vLLM must be started with
        # --trust-remote-code for models that ship custom code.
        model: "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8"
        credential_env: "OPENAI_API_KEY"
        credential_default: "dummy"
        timeout_secs: 180

      routed:
        provider_type: "openai"
        provider_name: "nvidia-router"
        endpoint: "http://localhost:4000/v1"
        model: "nvidia-routed"
        credential_env: "NVIDIA_API_KEY"
        timeout_secs: 180

      # YYC³ 本地推理 — DGX Spark N1 Ollama 服务 (通用)
      yyc3-ollama:
        provider_type: "openai"
        provider_name: "yyc3-dgx-n1-ollama"
        endpoint: "http://192.168.3.101:11434/v1"
        model: "qwen3.6:35b-a3b"
        credential_default: "dummy"
        timeout_secs: 300

      # YYC³ 本地推理 — DGX Spark N1 YYC³ Coder (代码专项)
      yyc3-coder:
        provider_type: "openai"
        provider_name: "yyc3-dgx-n1-ollama"
        endpoint: "http://192.168.3.101:11434/v1"
        model: "yyc3-coder-v1:latest"
        credential_default: "dummy"
        timeout_secs: 300

      # YYC³ 本地推理 — DGX Spark N1 YYC³ Mgmt (经管运维)
      yyc3-mgmt:
        provider_type: "openai"
        provider_name: "yyc3-dgx-n1-ollama"
        endpoint: "http://192.168.3.101:11434/v1"
        model: "yyc3-mgmt-v2:latest"
        credential_default: "dummy"
        timeout_secs: 300

      # YYC³ 本地推理 — Mac M4 Max MLX 服务 (YYC³ Family Coder)
      yyc3-mlx:
        provider_type: "openai"
        provider_name: "yyc3-mac-mlx"
        endpoint: "http://192.168.3.22:25603/v1"
        model: "/Users/yanyu/models/Family/Coder/v0.2.0+mlx"
        credential_default: "dummy"
        timeout_secs: 300

      # YYC³ 本地推理 — DGX Spark N2 Ollama 服务 (代码审查)
      yyc3-vllm:
        provider_type: "openai"
        provider_name: "yyc3-dgx-n2-ollama"
        endpoint: "http://192.168.3.102:11434/v1"
        model: "qwen3-coder-30b-a3b-q4:latest"
        credential_default: "dummy"
        timeout_secs: 300

      # YYC³ i18n 推理 — 本地沙箱 Ollama (AI 翻译引擎)
      yyc3-i18n:
        provider_type: "openai"
        provider_name: "yyc3-local-ollama"
        endpoint: "http://127.0.0.1:11434/v1"
        model: "qwen3.6:35b-a3b"
        credential_default: "dummy"
        timeout_secs: 300

  router:
    enabled: true
    port: 4000
    pool_config_path: "router/pool-config.yaml"

  policy:
    base: "sandboxes/openclaw/policy.yaml"
    additions:
      nim_service:
        name: nim_service
        endpoints:
          - host: "nim-service.local"
            port: 8000
            access: full

      # YYC³ i18n MCP Server & AI Translation Engine
      # MCP Server 由 OpenClaw 通过 stdio 内部管理，无需额外网络端口。
      # AI 翻译引擎复用本地 Ollama 端点 (127.0.0.1:11434)。
      # Sandbox → localhost 已在 base policy 中放行。
      yyc3_i18n:
        name: yyc3_i18n
        description: "YYC³ i18n translation & quality estimation service"
